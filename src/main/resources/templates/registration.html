<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>


    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                    /*linear-gradient(135deg, rgba(59,130,246,0.9), rgba(168,85,247,0.9)),*/
                    url('https://d-art.ppstatic.pl/kadry/k/r/1/5a/38/61fe328f43192_o_xlarge.jpg')
                    center/cover no-repeat;
            padding:20px;
        }

        .register-container{
            width:100%;
            max-width:460px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:28px;
            padding:40px;
            color:white;
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
        }

        .register-container h1{
            text-align:center;
            font-size:34px;
            margin-bottom:10px;
            font-weight:700;
        }

        .register-container p{
            text-align:center;
            opacity:0.85;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
        }

        .form-group input{
            width:100%;
            padding:14px 16px;
            border:none;
            border-radius:14px;
            outline:none;
            font-size:15px;
            background:rgba(255,255,255,0.15);
            color:white;
            transition:0.3s;
        }

        .form-group input::placeholder{
            color:rgba(255,255,255,0.7);
        }

        .form-group input:focus{
            background:rgba(255,255,255,0.22);
            box-shadow:0 0 0 3px rgba(255,255,255,0.15);
        }

        .register-btn{
            width:100%;
            border:none;
            border-radius:14px;
            padding:15px;
            font-size:16px;
            font-weight:700;
            background:white;
            color:#2563eb;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .register-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 24px rgba(255,255,255,0.25);
        }

        .alert{
            padding:14px;
            border-radius:14px;
            margin-bottom:20px;
            text-align:center;
            font-size:14px;
        }

        .alert-error{
            background:rgba(239,68,68,0.2);
            border:1px solid rgba(239,68,68,0.4);
        }

        .alert-success{
            background:rgba(34,197,94,0.2);
            border:1px solid rgba(34,197,94,0.4);
        }

        .bottom-text{
            margin-top:22px;
            text-align:center;
            font-size:14px;
        }

        .bottom-text a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }

        .bottom-text a:hover{
            text-decoration:underline;
        }

        @media(max-width:480px){

            .register-container{
                padding:30px 24px;
            }

            .register-container h1{
                font-size:28px;
            }

        }

    </style>
</head>
<body>

<div class="register-container">

    <h1>Utwórz konto </h1>
    <p>Dołącz do aplikacji już teraz</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}">
        Wystąpił błąd
    </div>


    <div th:if="${success}" class="alert alert-success" th:text="${success}">
        Konto zostało utworzone
    </div>

    <form th:action="@{/mvc/register}" method="post" th:object="${registrationDto}">

        <div class="form-group">
            <label for="username">Login</label>
            <input
                    type="text"
                    id="username"
                    th:field="*{username}"
                    placeholder="Wpisz login"
                    required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input
                    type="email"
                    id="email"
                    th:field="*{email}"
                    placeholder="Wpisz email"
                    required>
        </div>

        <div class="form-group">
            <label for="password">Hasło</label>
            <input
                    type="password"
                    id="password"
                    th:field="*{password}"
                    placeholder="Wpisz hasło"
                    required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Powtórz hasło</label>
            <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Powtórz hasło"
                    required>
        </div>
<!--         //tu nie ma jeszcze walidacji żadej (trzeba dodać aby hasła były takie same inaczej wgl nie wysyła forularza-->

        <button type="submit" class="register-btn">
            Zarejestruj się
        </button>

    </form>

    <div class="bottom-text">
        Masz już konto?
        <a th:href="@{/mvc/login}">Zaloguj się</a>
    </div>

</div>

</body>
</html>
