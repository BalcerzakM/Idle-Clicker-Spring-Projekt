<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                    /*linear-gradient(135deg, rgba(37,99,235,0.9), rgba(124,58,237,0.9)),*/
                    url('https://d-art.ppstatic.pl/kadry/k/r/1/5a/38/61fe328f43192_o_xlarge.jpg')
                    center/cover no-repeat;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
        }

        .login-container p {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.85;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-group input:focus {
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: white;
            color: #1e3a8a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.25);
        }

        .extra-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .extra-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
        }

        .alert-success {
            background: rgba(34,197,94,0.2);
            border: 1px solid rgba(34,197,94,0.4);
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">

    <h1>Witaj</h1>
    <p>Zaloguj się do swojego konta</p>

    <div th:if="${param.error}" class="alert alert-error">
        Nieprawidłowy login lub hasło
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        Zostałeś wylogowany
    </div>

    <form th:action="@{/mvc/login}" method="post">

        <div class="form-group">
            <label for="username">Login</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Wpisz login"
                    required>
        </div>

        <div class="form-group">
            <label for="password">Hasło</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Wpisz hasło"
                    required>
        </div>

        <button type="submit" class="login-btn">
            Zaloguj się
        </button>

    </form>

    <div class="extra-links">
        <p>
            Nie masz konta?
            <a th:href="@{/mvc/register}">Zarejestruj się</a>
        </p>
    </div>

</div>

</body>
</html>
