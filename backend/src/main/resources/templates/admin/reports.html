<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" th:href="@{/thymeleaf/favicon.png}">
  <link rel="stylesheet" th:href="@{/thymeleaf/style.css}">
  <title>Panel Administratora - Zgłoszenia</title>
  <style>
    /* Dodatkowe style dla tabeli */
    .reports-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background: var(--bg-panel, #1e1e2f);
      color: var(--text-light, #eee);
    }
    .reports-table th, .reports-table td {
      border: 1px solid var(--border-color, #333);
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }
    .reports-table th {
      background: var(--bg-dark, #2a2a2a);
      font-weight: bold;
    }
    .delete-btn {
      background: #aa2e2e;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .delete-btn:hover {
      background: #cc3b3b;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--neon-gold, #ffb347);
    }
  </style>
</head>
<body>
<header>
  <a th:href="@{/}"><img id="logo" th:src="@{/thymeleaf/images/logo.png}" alt="SRUBA Logo"></a>
</header>
<hr class="content-divider"/>
<main>
  <div class="form-container" style="max-width: 1200px;">
    <h1>📋 Zgłoszenia użytkowników</h1>

    <div th:if="${reports.isEmpty()}" class="alert alert-info">
      Brak zgłoszeń do wyświetlenia.
    </div>

    <table class="reports-table" th:unless="${reports.isEmpty()}">
      <thead>
      <tr>
        <th>ID</th>
        <th>Użytkownik</th>
        <th>Tytuł</th>
        <th>Opis</th>
        <th>Data zgłoszenia</th>
        <th>Akcje</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="report : ${reports}">
        <td th:text="${report.id}">1</td>
        <td th:text="${report.user.username}">jan123</td>
        <td th:text="${report.title}">Problem z logowaniem</td>
        <td th:text="${report.description}">Szczegółowy opis...</td>
        <td th:text="${#temporals.format(report.createdAt, 'dd.MM.yyyy HH:mm')}" th:if="${report.createdAt}">01.01.2025 12:00</td>
        <td th:unless="${report.createdAt}">brak</td>
        <td>
          <form th:action="@{/mvc/admin/reports/delete/{id}(id=${report.id})}" method="post" onsubmit="return confirm('Czy na pewno usunąć to zgłoszenie?');">
            <button type="submit" class="delete-btn">Usuń</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>

    <a th:href="@{/}" class="back-link">← Powrót do strony głównej</a>
  </div>
</main>
<hr class="content-divider"/>
<footer>
  <p>&copy; 2026 SRUBA Inc. Wszelkie prawa zastrzeżone.</p>
</footer>
</body>
</html>
