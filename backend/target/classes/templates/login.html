<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" th:href="@{/thymeleaf/favicon.png}">
    <link rel="stylesheet" th:href="@{/thymeleaf/style.css}">
    <title>Logowanie</title>


    <style>

        .form-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }



        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
        }

        .alert-success {
            background: rgba(34,197,94,0.2);
            border: 1px solid rgba(34,197,94,0.4);
        }

        @media (max-width: 480px) {
            .form-container {
                margin: 20px;
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img id="logo" th:src="@{/thymeleaf/images/logo.png}" alt="SRUBA Logo">
    </header>
    <hr class="content-divider"/>
    <main>
        <div class="form-container">

            <h1>Witaj</h1>
            <p>Zaloguj się do swojego konta</p>

            <div th:if="${param.error}" class="alert alert-error">
                Nieprawidłowy login lub hasło
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                Zostałeś wylogowany
            </div>

            <form th:action="@{/mvc/login}" method="post">

                <div class="form-group">
                    <label for="username">Login</label>
                    <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Wpisz login"
                            required>
                </div>

                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Wpisz hasło"
                            required>
                </div>

                <button type="submit" class="form-btn">
                    Zaloguj się
                </button>

            </form>

            <div class="extra-links">
                <p>
                    Nie masz konta?
                    <a th:href="@{/mvc/register}">Zarejestruj się</a>
                </p>
            </div>

        </div>
    </main>
    <hr class="content-divider"/>
    <footer>
        <p>&copy; 2026 SRUBA Inc. Wszelkie prawa zastrzeżone.</p>
    </footer>
</body>
</html>
